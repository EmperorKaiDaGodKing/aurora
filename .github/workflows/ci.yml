name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Install, Lint, Typecheck, Build
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Debug node/npm versions
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          pnpm -v 2>/dev/null || true
          yarn -v 2>/dev/null || true

      - name: Detect package manager
        id: detect_pm
        run: |
          if [ -f pnpm-lock.yaml ]; then echo "pm=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then echo "pm=yarn" >> $GITHUB_OUTPUT
          else echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (via Corepack)
        run: |
          # Use Corepack to activate PNPM/Yarn without global installs (safer for CI)
          corepack enable

          if [ "${{ steps.detect_pm.outputs.pm }}" = "pnpm" ]; then
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile
          elif [ "${{ steps.detect_pm.outputs.pm }}" = "yarn" ]; then
            corepack prepare yarn@stable --activate
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present
