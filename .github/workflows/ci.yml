name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Install, Lint, Typecheck, Build
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js (18.x)
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Debug environment
        run: |
          set -eux
          echo "SHELL: $SHELL"
          uname -a
          node -v || true
          npm -v || true
          corepack -v 2>/dev/null || echo "corepack not present"
          which pnpm || true
          which yarn || true
          which npx || true

      - name: Detect package manager / lockfile
        id: detect_pm
        run: |
          # Detect the lockfile and expose as an output (pm)
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "pm=npm-lock" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi
          
      - name: Ensure npm registry and pre-install Tailwind
        run: |
          set -eux
          # make sure we use the public npm registry in case CI is pointing somewhere else
          npm config set registry https://registry.npmjs.org/
          # install a compatible Tailwind release into the environment so the install step doesn't fail
          npm install tailwindcss@latest --no-save || true

      - name: Install dependencies (safe, lockfile-aware)
        run: |
          set -eux
          PM="${{ steps.detect_pm.outputs.pm }}"
          echo "Detected package manager: $PM"

          # Try to enable Corepack (non-fatal)
          corepack enable || echo "corepack enable failed (continuing)"

          if [ "$PM" = "pnpm" ]; then
            # Prepare pnpm via Corepack if possible, otherwise fallback to npx
            corepack prepare pnpm@latest --activate || echo "corepack prepare pnpm failed"
            if command -v pnpm >/dev/null 2>&1; then
              pnpm install --frozen-lockfile || pnpm install
            else
              npx pnpm@latest install --frozen-lockfile || npx pnpm@latest install
            fi

          elif [ "$PM" = "yarn" ]; then
            # Prepare yarn via Corepack if possible, otherwise fallback to npx
            corepack prepare yarn@stable --activate || echo "corepack prepare yarn failed"
            if command -v yarn >/dev/null 2>&1; then
              # Try immutable install first (works for Yarn v2+), else normal install
              yarn install --immutable || yarn install
            else
              npx yarn@stable install --immutable || npx yarn@stable install
            fi

          elif [ "$PM" = "npm-lock" ]; then
            # Reproducible npm install when package-lock.json exists
            npm ci

          else
            # No lockfile present -> use npm install (safer than npm ci)
            npm install
          fi

      - name: Post-install verification
        run: |
          set -eux
          echo "Post-install versions and available package managers:"
          node -v
          npm -v
          if command -v pnpm >/dev/null 2>&1; then pnpm -v; else echo "pnpm: not installed"; fi
          if command -v yarn >/dev/null 2>&1; then yarn -v; else echo "yarn: not installed"; fi

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present
