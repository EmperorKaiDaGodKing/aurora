name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Install, Lint, Typecheck, Build
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Debug node/npm versions
        run: |
          set -eux
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          pnpm -v 2>/dev/null || echo "pnpm not present"
          yarn -v 2>/dev/null || echo "yarn not present"

      - name: Detect package manager / lockfile
        id: detect_pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "pm=npm-lock" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (safe, lockfile-aware)
        run: |
          set -eux
          PM="${{ steps.detect_pm.outputs.pm }}"
          echo "Detected package manager: $PM"

          # Try to enable corepack (non-fatal)
          corepack enable || echo "corepack enable failed (continuing)"

          if [ "$PM" = "pnpm" ]; then
            corepack prepare pnpm@latest --activate || echo "corepack prepare pnpm failed"
            if command -v pnpm >/dev/null 2>&1; then
              pnpm install --frozen-lockfile || pnpm install
            else
              npx pnpm@latest install --frozen-lockfile || npx pnpm@latest install
            fi

          elif [ "$PM" = "yarn" ]; then
            corepack prepare yarn@stable --activate || echo "corepack prepare yarn failed"
            if command -v yarn >/dev/null 2>&1; then
              yarn install --immutable || yarn install
            else
              npx yarn@stable install --immutable || npx yarn@stable install
            fi

          elif [ "$PM" = "npm-lock" ]; then
            # package-lock.json exists -> reproducible install
            npm ci

          else
            # No lockfile -> use npm install to generate a lockfile locally (safer)
            npm install
          fi

      - name: Post-install versions
        run: |
          set -eux
          echo "post-install versions:"
          node -v
          npm -v
          pnpm -v 2>/dev/null || echo "pnpm not installed"
          yarn -v 2>/dev/null || echo "yarn not installed"

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present
